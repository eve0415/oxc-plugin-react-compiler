name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: clippy

      - name: Run Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Run unit tests
        run: cargo test --package oxc_react_compiler

  conformance:
    name: Conformance
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    env:
      RAYON_NUM_THREADS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@624fe22ccfe9204a526ac8139186d34297453722 # v1.0.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Build vendored upstream compiler
        working-directory: third_party/react/compiler
        run: |
          yarn install --frozen-lockfile --ignore-scripts
          yarn workspace babel-plugin-react-compiler build

      - name: Run conformance suite
        run: cargo run --release --bin conformance

  check:
    name: Check
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@624fe22ccfe9204a526ac8139186d34297453722 # v1.0.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5.0.0

      - name: Build NAPI binding
        run: pnpm exec napi build --platform --release --esm -p oxc_react_compiler_napi --package-json-path napi/package.json -o napi/dist

      - name: Run vp check
        run: vp check

  audit:
    name: Audit
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@624fe22ccfe9204a526ac8139186d34297453722 # v1.0.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5.0.0

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  coverage:
    name: Coverage
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@a164de717a0ee9284c2d9db1c6016a4c339cd333 # v2.69.14
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: |
          cargo llvm-cov --package oxc_react_compiler --no-report
          cargo llvm-cov report --text 2>&1 | tee coverage.txt
          {
            echo '## Coverage Report'
            echo ''
            echo '```'
            cat coverage.txt
            echo '```'
          } > coverage.md
          # Truncate if too large for GitHub's 65536 char comment limit
          if [ "$(wc -c < coverage.md)" -gt 60000 ]; then
            {
              echo '## Coverage Report'
              echo ''
              echo '> Truncated to fit GitHub comment limits. See CI logs for full report.'
              echo ''
              echo '```'
              head -2 coverage.txt
              echo '  ...'
              tail -2 coverage.txt
              echo '```'
            } > coverage.md
          fi

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: coverage
          path: coverage.md
