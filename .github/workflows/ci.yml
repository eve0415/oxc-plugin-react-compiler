name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: clippy

      - name: Run Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Run unit tests
        run: cargo test --package oxc_react_compiler

  conformance:
    name: Conformance
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    env:
      RAYON_NUM_THREADS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@624fe22ccfe9204a526ac8139186d34297453722 # v1.0.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Build vendored upstream compiler
        working-directory: third_party/react/compiler
        run: |
          yarn install --frozen-lockfile --ignore-scripts
          yarn workspace babel-plugin-react-compiler build

      - name: Run conformance suite
        run: cargo run --release --bin conformance

  napi:
    name: NAPI Build & Typecheck
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@624fe22ccfe9204a526ac8139186d34297453722 # v1.0.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Build NAPI binding
        run: vpx napi build --platform --release -p oxc_react_compiler_napi --package-json-path napi/package.json -o napi/dist

      - name: Typecheck
        run: vp check --no-lint

  napi-windows:
    name: NAPI Build (Windows)
    runs-on: windows-2025
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@624fe22ccfe9204a526ac8139186d34297453722 # v1.0.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Build NAPI binding
        run: pnpm exec napi build --platform --release -p oxc_react_compiler_napi --package-json-path napi/package.json -o napi/dist

  audit:
    name: Audit
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@624fe22ccfe9204a526ac8139186d34297453722 # v1.0.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  coverage:
    name: Coverage
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2.69.6
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: |
          cargo llvm-cov --package oxc_react_compiler --no-report
          cargo llvm-cov report --output-type text 2>&1 | tee coverage.txt
          echo '## Coverage Report' > coverage.md
          echo '' >> coverage.md
          echo '```' >> coverage.md
          cat coverage.txt >> coverage.md
          echo '```' >> coverage.md

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: coverage
          path: coverage.md
