name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-26-intel

          - target: aarch64-apple-darwin
            runner: macos-26

          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm

          - target: x86_64-pc-windows-msvc
            runner: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@8ecb39174989ce55af90f45cf55b02738599831d # v1.0.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5.0.0

      - name: Build NAPI binding
        run: pnpm exec napi build --platform --release --esm -p oxc_react_compiler_napi --package-json-path napi/package.json -o napi/dist

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: binding-${{ matrix.target }}
          path: |
            napi/dist/*.node
            napi/dist/index.js
            napi/dist/index.d.ts
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-24.04-arm
    needs: build
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@8ecb39174989ce55af90f45cf55b02738599831d # v1.0.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true
          registry-url: 'https://registry.npmjs.org/'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: artifacts

      - name: Verify all artifacts exist
        run: |
          missing=0
          for f in \
            artifacts/binding-x86_64-apple-darwin/oxc-react-compiler.darwin-x64.node \
            artifacts/binding-aarch64-apple-darwin/oxc-react-compiler.darwin-arm64.node \
            artifacts/binding-x86_64-unknown-linux-gnu/oxc-react-compiler.linux-x64-gnu.node \
            artifacts/binding-aarch64-unknown-linux-gnu/oxc-react-compiler.linux-arm64-gnu.node \
            artifacts/binding-x86_64-pc-windows-msvc/oxc-react-compiler.win32-x64-msvc.node; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing artifact: $f"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          echo "All 5 platform artifacts verified."

      - name: Move artifacts to platform packages
        run: pnpm exec napi artifacts --package-json-path napi/package.json --build-output-dir artifacts --npm-dir napi/npm

      - name: Build Vite plugin
        run: vp pack

      - name: Copy NAPI JS loader to dist
        run: cp artifacts/binding-aarch64-unknown-linux-gnu/index.js artifacts/binding-aarch64-unknown-linux-gnu/index.d.ts napi/dist/

      - name: List artifacts
        run: |
          echo "=== Platform packages ==="
          ls -lR napi/npm/
          echo "=== Dist ==="
          ls -lR napi/dist/

      - name: Publish platform packages
        run: |
          for pkg in napi/npm/*/; do
            echo "Publishing $pkg"
            pnpm publish "$pkg" --provenance --access public --no-git-checks || echo "::warning::Skipped $pkg (already published or error)"
            sleep 10
          done

      - name: Copy README into napi package
        run: cp README.md napi/README.md

      - name: Publish oxc-plugin-react-compiler
        run: pnpm publish napi/ --provenance --access public --no-git-checks || echo "::warning::Skipped main package (already published or error)"

      - name: Pack tarballs for attestation
        run: |
          mkdir -p attestation-subjects
          dest="$(pwd)/attestation-subjects"
          for pkg in napi/npm/*/; do
            (cd "$pkg" && pnpm pack --pack-destination "$dest")
          done
          (cd napi && pnpm pack --pack-destination "$dest")
          echo "=== Attestation subjects ==="
          ls -l attestation-subjects/
        env:
          npm_config_ignore_scripts: true

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: attestation-subjects/*.tgz

  release:
    name: GitHub Release
    runs-on: ubuntu-24.04-arm
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
